name: reusable release preparation

on:
  workflow_call:
    inputs:
      java_version:
        description: JDK version used by the Fabric build
        required: false
        default: '25'
        type: string
      resolve_release_notes_with_gradle:
        description: Resolve release notes through the mod-publishing Gradle task
        required: false
        default: true
        type: boolean
      additional_artifact_pattern:
        description: Optional glob for one additional release JAR under build/libs
        required: false
        default: ''
        type: string
    secrets:
      release_token:
        description: GitHub token used only when generated release notes are required
        required: true
    outputs:
      artifact_file:
        description: Exact release JAR file name
        value: ${{ jobs.prepare.outputs.artifact_file }}
      additional_artifact_file:
        description: Exact additional release JAR file name, or empty when not configured
        value: ${{ jobs.prepare.outputs.additional_artifact_file }}
      release_body:
        description: Annotated-tag or GitHub-generated release notes
        value: ${{ jobs.prepare.outputs.release_body }}

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      artifact_file: ${{ steps.artifact.outputs.file }}
      additional_artifact_file: ${{ steps.artifact.outputs.additional_file }}
      release_body: ${{ steps.notes.outputs.body }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: microsoft

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: verify tag matches mod version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          if [ "v${VERSION}" != "${TAG_NAME}" ]; then
            echo "Expected tag v${VERSION}, got ${TAG_NAME}"
            exit 1
          fi

      - name: build
        run: ./gradlew clean build

      - name: collect exact release artifacts
        id: artifact
        env:
          ADDITIONAL_ARTIFACT_PATTERN: ${{ inputs.additional_artifact_pattern }}
        run: |
          VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          ARCHIVES_NAME="$(grep '^archives_base_name=' gradle.properties | cut -d= -f2)"
          ARTIFACT_FILE="${ARCHIVES_NAME}-${VERSION}.jar"
          test -f "build/libs/${ARTIFACT_FILE}"
          mkdir -p release-artifacts
          cp "build/libs/${ARTIFACT_FILE}" "release-artifacts/${ARTIFACT_FILE}"
          echo "file=${ARTIFACT_FILE}" >> "$GITHUB_OUTPUT"
          echo "additional_file=" >> "$GITHUB_OUTPUT"
          if [ -n "${ADDITIONAL_ARTIFACT_PATTERN}" ]; then
            mapfile -t ADDITIONAL_FILES < <(compgen -G "build/libs/${ADDITIONAL_ARTIFACT_PATTERN}" || true)
            if [ "${#ADDITIONAL_FILES[@]}" -ne 1 ]; then
              echo "Expected exactly one additional release artifact matching ${ADDITIONAL_ARTIFACT_PATTERN}; found ${#ADDITIONAL_FILES[@]}."
              exit 1
            fi
            ADDITIONAL_FILE="$(basename "${ADDITIONAL_FILES[0]}")"
            if [ "${ADDITIONAL_FILE}" = "${ARTIFACT_FILE}" ]; then
              echo "Additional release artifact must differ from the primary artifact."
              exit 1
            fi
            cp "${ADDITIONAL_FILES[0]}" "release-artifacts/${ADDITIONAL_FILE}"
            echo "additional_file=${ADDITIONAL_FILE}" >> "$GITHUB_OUTPUT"
          fi

      - name: upload exact release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifact
          path: release-artifacts/*.jar
          if-no-files-found: error

      - name: resolve release notes
        if: inputs.resolve_release_notes_with_gradle
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.release_token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradlew resolveModReleaseNotes


      - name: resolve bootstrap release notes
        if: ${{ !inputs.resolve_release_notes_with_gradle }}
        env:
          GH_TOKEN: ${{ secrets.release_token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          NOTES="$(git for-each-ref "refs/tags/${RELEASE_TAG}" --format='%(contents)')"
          if [ -z "${NOTES}" ]; then
            NOTES="$(gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f "tag_name=${RELEASE_TAG}" \
              -f "target_commitish=${GITHUB_SHA}" \
              --jq '.body')"
          fi
          mkdir -p build/mod-publishing
          printf '%s\n' "${NOTES}" > build/mod-publishing/release-notes.md

      - name: export release notes
        id: notes
        run: |
          DELIMITER="RELEASE_NOTES_$(date +%s%N)"
          {
            echo "body<<${DELIMITER}"
            cat build/mod-publishing/release-notes.md
            echo "${DELIMITER}"
          } >> "$GITHUB_OUTPUT"
