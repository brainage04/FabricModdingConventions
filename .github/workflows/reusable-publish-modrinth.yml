name: reusable Modrinth publication

on:
  workflow_call:
    inputs:
      artifact_file:
        description: Exact release JAR file name from release preparation
        required: true
        type: string
      release_body:
        description: Release notes shared across destinations
        required: true
        type: string
      java_version:
        description: JDK version used by the Fabric build
        required: false
        default: '25'
        type: string
      project_id:
        description: Existing Modrinth project id; project synchronization resolves it when omitted
        required: false
        default: ''
        type: string
      gradle_task:
        description: Gradle task that publishes this artifact to Modrinth
        required: false
        default: publishModrinth
        type: string
      sync_gradle_task:
        description: Gradle task that synchronizes the Modrinth project and icon
        required: false
        default: syncModrinthIcon
        type: string
      sync_project:
        description: Synchronize project metadata and icon before publishing
        required: false
        default: true
        type: boolean
      sync_state_file:
        description: Project state file written by the synchronization task
        required: false
        default: build/mod-publishing/modrinth-project-state.json
        type: string
    secrets:
      modrinth_token:
        description: Modrinth personal access token
        required: false
    outputs:
      project_id:
        description: Synchronized or configured Modrinth project id
        value: ${{ jobs.publish.outputs.project_id }}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    outputs:
      project_id: ${{ steps.project.outputs.id }}
    steps:
      - name: check Modrinth token
        id: config
        env:
          MODRINTH_TOKEN: ${{ secrets.modrinth_token }}
        run: |
          if [ -z "${MODRINTH_TOKEN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Modrinth publication because its token is not configured."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: microsoft

      - name: setup gradle
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        if: steps.config.outputs.enabled == 'true'
        run: chmod +x ./gradlew

      - name: download exact release artifact
        if: steps.config.outputs.enabled == 'true'
        uses: actions/download-artifact@v7
        with:
          name: release-artifact
          path: release-artifacts

      - name: synchronize Modrinth project and icon
        id: modrinth_sync
        if: steps.config.outputs.enabled == 'true' && inputs.sync_project
        continue-on-error: true
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REPOSITORY_DESCRIPTION: ${{ github.event.repository.description }}
          GRADLE_TASK: ${{ inputs.sync_gradle_task }}
          MODRINTH_PROJECT_ID: ${{ inputs.project_id }}
          MODRINTH_TOKEN: ${{ secrets.modrinth_token }}
        run: ./gradlew "${GRADLE_TASK}" -PpublishModrinth=true

      - name: export synchronized Modrinth project state
        if: steps.config.outputs.enabled == 'true' && inputs.sync_project && steps.modrinth_sync.outcome == 'success'
        run: |
          state_file='${{ inputs.sync_state_file }}'
          project_id="$(jq -er '.id | select(type == "string" and length > 0)' "$state_file")"
          project_created="$(jq -er '.created | tostring' "$state_file")"
          {
            echo "MODRINTH_PROJECT_ID=$project_id"
            echo "MODRINTH_PROJECT_CREATED=$project_created"
          } >> "$GITHUB_ENV"

      - name: export configured Modrinth project
        if: steps.config.outputs.enabled == 'true' && inputs.sync_project == false
        env:
          CONFIGURED_PROJECT_ID: ${{ inputs.project_id }}
        run: |
          if [ -z "${CONFIGURED_PROJECT_ID}" ]; then
            echo "Modrinth project id is required when project synchronization is disabled."
            exit 1
          fi
          echo "MODRINTH_PROJECT_ID=${CONFIGURED_PROJECT_ID}" >> "$GITHUB_ENV"

      - name: expose Modrinth project id
        id: project
        if: steps.config.outputs.enabled == 'true' && (inputs.sync_project == false || steps.modrinth_sync.outcome == 'success')
        run: |
          if [ -z "${MODRINTH_PROJECT_ID}" ]; then
            echo "Modrinth project id was not resolved."
            exit 1
          fi
          echo "id=${MODRINTH_PROJECT_ID}" >> "$GITHUB_OUTPUT"

      - name: publish Modrinth version
        if: steps.config.outputs.enabled == 'true'
        env:
          GRADLE_TASK: ${{ inputs.gradle_task }}
          MOD_PUBLISHING_RELEASE_JAR: release-artifacts/${{ inputs.artifact_file }}
          MODRINTH_TOKEN: ${{ secrets.modrinth_token }}
          RELEASE_BODY: ${{ inputs.release_body }}
          RELEASE_PRERELEASE: ${{ contains(github.ref_name, '-') }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: ./gradlew "${GRADLE_TASK}" -PpublishModrinth=true

      - name: fail if Modrinth synchronization failed
        if: always() && steps.config.outputs.enabled == 'true' && inputs.sync_project && steps.modrinth_sync.outcome == 'failure'
        run: |
          echo "Modrinth project or icon synchronization failed before version publication."
          exit 1
