name: reusable CurseForge publication

on:
  workflow_call:
    inputs:
      artifact_file:
        description: Exact release JAR file name from release preparation
        required: true
        type: string
      release_body:
        description: Release notes shared across destinations
        required: true
        type: string
      java_version:
        description: JDK version used by the Fabric build
        required: false
        default: '25'
        type: string
      project_id:
        description: CurseForge numeric project id
        required: true
        type: string
      project_slug:
        description: CurseForge project slug
        required: false
        default: ''
        type: string
    secrets:
      curseforge_token:
        description: CurseForge API token
        required: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: check CurseForge configuration
        id: config
        env:
          CURSEFORGE_PROJECT_ID: ${{ inputs.project_id }}
          CURSEFORGE_TOKEN: ${{ secrets.curseforge_token }}
        run: |
          if [ -z "${CURSEFORGE_TOKEN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping CurseForge publication because its token is not configured."
          elif [ -z "${CURSEFORGE_PROJECT_ID}" ]; then
            echo "Missing CurseForge project id."
            exit 1
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout repository
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: validate gradle wrapper
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/wrapper-validation@v5

      - name: setup jdk
        if: steps.config.outputs.enabled == 'true'
        uses: actions/setup-java@v5
        with:
          java-version: ${{ inputs.java_version }}
          distribution: microsoft

      - name: setup gradle
        if: steps.config.outputs.enabled == 'true'
        uses: gradle/actions/setup-gradle@v5

      - name: make gradle wrapper executable
        if: steps.config.outputs.enabled == 'true'
        run: chmod +x ./gradlew

      - name: download exact release artifact
        if: steps.config.outputs.enabled == 'true'
        uses: actions/download-artifact@v7
        with:
          name: release-artifact
          path: release-artifacts

      - name: publish CurseForge file
        if: steps.config.outputs.enabled == 'true'
        env:
          CURSEFORGE_TOKEN: ${{ secrets.curseforge_token }}
          MOD_PUBLISHING_RELEASE_JAR: release-artifacts/${{ inputs.artifact_file }}
          RELEASE_BODY: ${{ inputs.release_body }}
          RELEASE_PRERELEASE: ${{ contains(github.ref_name, '-') }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: >-
          ./gradlew publishCurseforge
          -PpublishCurseforge=true
          -PcurseforgeProjectId=${{ inputs.project_id }}
          -PcurseforgeProjectSlug=${{ inputs.project_slug }}
